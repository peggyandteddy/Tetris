<script>
(() => {

  const shapes={
    I:[[1,1,1,1]], O:[[1,1],[1,1]], T:[[0,1,0],[1,1,1]], S:[[0,1,1],[1,1,0]],

    classic:[659,494,523,587,523,494,440,440,523,659,587,523,494],

  };
  function makeMini(){ const m=$("mini"); m.innerHTML=""; for(let i=0;i<48;i++){const d=document.createElement("div"); d.className="px "+(["","p1","p2","p3","p4","p5"][i%6]); if(i%3===0)d.className="px"; m.appendChild(d);} }
  function setBg(bg){ selectedBg=bg; $("playArea").className="play-area bg-"+bg; $("preview").style.background = bg==="space" ? "radial-gradient(circle,#312e81,#050816)" : bg==="forest" ? "linear-gradient(#052e16,#07130c)" : bg==="sunset" ? "linear-gradient(#451a03,#111827)" : "linear-gradient(#111827,#040714)"; }

  window.addEventListener("keydown",e=>{ if(!$("game").classList.contains("active"))return; const k=e.key.toLowerCase(); if(k==="arrowleft")move(-1); if(k==="arrowright")move(1); if(k==="arrowup")rotate(); if(k==="arrowdown")soft(); if(k===" ")hard(); if(k==="p")pause(); });
  document.querySelectorAll("[data-key]").forEach(btn=>{ btn.addEventListener("click",()=>{ const k=btn.dataset.key; if(k==="left")move(-1); if(k==="right")move(1); if(k==="rotate")rotate(); if(k==="down")soft(); if(k==="drop")hard(); if(k==="pause")pause(); if(k==="hold"){audio.s("move");} }); });
  canvas.addEventListener("touchstart",e=>{const t=e.touches[0];touchStart={x:t.clientX,y:t.clientY};},{passive:true});
  canvas.addEventListener("touchend",e=>{ if(!touchStart)return; const t=e.changedTouches[0],dx=t.clientX-touchStart.x,dy=t.clientY-touchStart.y; if(Math.max(Math.abs(dx),Math.abs(dy))<18){rotate();} else if(Math.abs(dx)>Math.abs(dy)){move(dx>0?1:-1);} else {dy>0?hard():rotate();} touchStart=null;},{passive:true});
  makeMini(); updateSpeed(650); setBg("neon"); reset(); draw();
})();
</script>
</body>
</html>
